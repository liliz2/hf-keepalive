name: Keep HuggingFace Space Awake

on:
  schedule:
    - cron: "*/7 * * * *"   # 每 7 分钟运行一次
  workflow_dispatch:         # 允许手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Curl HuggingFace Space
        run: |
          curl -L https://huggingface.co/spaces/liliz2/Co-Mutation > /dev/null 2>&1
